version: "3.8"

services:
  endee:
    image: endeeio/endee:latest
    container_name: endee-vector-db
    ports:
      - "8080:8080"
    volumes:
      - endee_data:/data
    restart: unless-stopped
    environment:
      - ENDEE_LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  endee_data:
    driver: local
